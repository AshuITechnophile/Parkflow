<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parkflow</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Our CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <!-- NAVIGATION BAR -->
    <nav class="navbar">

        <!-- Left side - Logo -->
        <a href="#" class="logo">Parkflow</a>

        <!-- Middle - Links -->
        <ul class="nav-links">
            <li><a href="#" class="nav-link active">Find Parking</a></li>
            <li><a href="#" class="nav-link">My Bookings</a></li>
            <li><a href="#" class="nav-link">Facilities</a></li>
            <li><a href="#" class="nav-link">Help</a></li>
        </ul>

        <!-- Right side - Buttons -->
        <div class="nav-buttons">
            <button class="btn-login">Login</button>
            <button class="btn-signup">Sign Up</button>
        </div>

    </nav>

    <!-- HERO SECTION -->
    <section class="hero">

        <!-- Dark blue background overlay -->
        <div class="hero-overlay"></div>

        <!-- Background image -->
        <img class="hero-bg-image"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv6hx7f7qilE0vUKFnbYgN60iqTSGk6eik78_JN94UHKGSmIxFTBjC10oje_BKVFl2bReZ8Dc7KBLv6kHV6RlMZ7E7GOpXntVAms7O8s6S0RpyWK6ih6btqDG93NrglJg4sNTfQo6dbnLQ9jOnHgU23j0qupZM4WJXjbm8U2oDYsBaM9q9oiPRoVCCjru3P8-xekfRqcvR4IsZP64hZ97UCxtCVkCPvqz0jkIdwqxfs0GiiBF_1TwCmqz59G1Pg55qnpSEHgbx3cWz"
            alt="Indian city skyline" />

        <!-- Hero text and search box -->
        <div class="hero-content">

            <!-- Heading -->
            <h1 class="hero-title">Find & Book Parking <br /> in Seconds</h1>

            <!-- Subtext -->
            <p class="hero-subtitle">
                Secure your spot at over 500 premium facilities across India.
                Reliable, touchless, and guaranteed.
            </p>

            <!-- Search Box Card -->
            <div class="search-card">

                <!-- Location input -->
                <div class="search-field">
                    <label>LOCATION</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">location_on</span>
                        <input type="text" placeholder="Where are you going?" />
                    </div>
                </div>

                <!-- Date input -->
                <div class="search-field">
                    <label>DATE</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">calendar_today</span>
                        <input type="date" />
                    </div>
                </div>

                <!-- Time input -->
                <div class="search-field">
                    <label>TIME</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">schedule</span>
                        <input type="time" />
                    </div>
                </div>

                <!-- Search button -->
                <button class="btn-search">Find Parking</button>

            </div>
        </div>

    </section>

</body>

</html>
